<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body{margin:0;font-family:var(--font-en);background:#fff}
  #root{padding:14px 16px}
  .g{display:grid;grid-template-columns:90px repeat(6,1fr);gap:6px;align-items:center}
  .h{font-size:9.5px;color:var(--ink-3);text-align:center}
  .n{font-size:10.5px;color:var(--ink-2)}
  a{color:var(--speedi-red)}a:hover{color:#c9302a}
</style></head><body>
<div id="root"></div>
<script type="text/babel">
const { Icon } = window.SpeediDesignSystem_e741f3;
const styles = ['Linear','Outline','Bold','Bulk','Broken','Twotone'];
const glyphs = [['Add','Add'],['Minus','Minus'],['Location','Location'],['MessageAdd','MessageAdd'],['ArrowSquareDown','ArrowSquareDown']];
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="g">
    <span></span>{styles.map(s=><span key={s} className="h">{s}</span>)}
    {glyphs.map(([label,base])=>(
      <React.Fragment key={base}>
        <span className="n">{label}</span>
        {styles.map(s=><span key={s} style={{textAlign:'center', color:'var(--ink-1)'}}><Icon name={base+'Property1'+s} size={22} /></span>)}
      </React.Fragment>
    ))}
    <span className="n">Tag</span>
    <span style={{color:'var(--speedi-red)'}}><Icon name="TagTypeRed" size={22} /></span>
    <span style={{color:'var(--speedi-green)'}}><Icon name="TagTypeGreeen" size={22} /></span>
    <span className="h" style={{gridColumn:'span 4'}}>type=red / green</span>
  </div>
);
</script>
