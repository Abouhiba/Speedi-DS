<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);display:flex;gap:10px;padding:14px;background:#fff;box-sizing:border-box}
  .sw{flex:1;border-radius:12px;padding:12px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;height:94px}
  .n{font-weight:600;font-size:14px}.h{font-size:11px;opacity:.85}

</style></head><body>
  <div class="sw" style="background:var(--speedi-red)"><span class="n">Speedi Red</span><span class="h">#DD2A1F · --speedi-red · buttons, prices, active</span></div>
  <div class="sw" style="background:var(--speedi-green)"><span class="n">Fresh Green</span><span class="h">#1EA13C · --speedi-green · success, free delivery</span></div>
  <div class="sw" style="background:var(--speedi-red-print)"><span class="n">Print Red</span><span class="h">#EE2447 · PANTONE P 8-55 C · print only</span></div>
</body></html>
