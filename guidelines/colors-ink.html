<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);display:flex;gap:10px;padding:14px;background:#fff;box-sizing:border-box}
  .sw{flex:1;border-radius:12px;padding:12px;display:flex;flex-direction:column;justify-content:flex-end;height:94px;color:#fff}
  .n{font-weight:600;font-size:13px}.h{font-size:10.5px;opacity:.8}
  a{color:var(--speedi-red)}a:hover{color:#c9302a}
</style></head><body>
  <div class="sw" style="background:var(--ink-black)"><span class="n">Ink Black</span><span class="h">#141414 · titles</span></div>
  <div class="sw" style="background:var(--ink-1)"><span class="n">Ink 1</span><span class="h">#262626 · body text</span></div>
  <div class="sw" style="background:var(--ink-2)"><span class="n">Ink 2</span><span class="h">#595959 · secondary</span></div>
  <div class="sw" style="background:var(--ink-3)"><span class="n">Ink 3</span><span class="h">#8C8C8C · muted, placeholder</span></div>
</body></html>
