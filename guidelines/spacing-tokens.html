<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing tokens" subtitle="Gutters, paddings, control heights" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);padding:16px;background:#fff;box-sizing:border-box}
  .bar{display:flex;align-items:center;gap:10px;margin:7px 0}
  .b{background:var(--pastel-rose);border:1px solid var(--speedi-red);height:18px;border-radius:3px}
  .l{font-size:11.5px;color:var(--ink-2);width:250px}
  a{color:var(--speedi-red)}a:hover{color:#c9302a}
</style></head><body>
  <div class="bar"><span class="l">--pad-button · 10px inner padding</span><div class="b" style="width:10px"></div></div>
  <div class="bar"><span class="l">--pad-card · 12px card padding</span><div class="b" style="width:12px"></div></div>
  <div class="bar"><span class="l">--pad-page · 15pt page gutters (30px @2x)</span><div class="b" style="width:15px"></div></div>
  <div class="bar"><span class="l">--height-back-chip · 30px</span><div class="b" style="width:30px"></div></div>
  <div class="bar"><span class="l">--height-navbar / --height-button · 48px</span><div class="b" style="width:48px"></div></div>
</body></html>
