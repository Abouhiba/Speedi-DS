<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);padding:14px;background:#fff;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}
  .sw{border-radius:8px;height:46px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);display:flex;align-items:flex-end;padding:5px;box-sizing:border-box}
  .h{font-size:8.5px;color:var(--ink-2)}
  .accent{margin-top:8px;display:flex;gap:8px}
  .accent .sw{flex:1;height:44px}
  a{color:var(--speedi-red)}a:hover{color:#c9302a}
</style></head><body>
  <div class="grid">
    <div class="sw" style="background:#fff3aa"><span class="h">fff3aa</span></div>
    <div class="sw" style="background:#b7efff"><span class="h">b7efff</span></div>
    <div class="sw" style="background:#ffe38f"><span class="h">ffe38f</span></div>
    <div class="sw" style="background:#ffd0a8"><span class="h">ffd0a8</span></div>
    <div class="sw" style="background:#e4ffde"><span class="h">e4ffde</span></div>
    <div class="sw" style="background:#f6f6ee"><span class="h">f6f6ee</span></div>
    <div class="sw" style="background:#ececec"><span class="h">ececec</span></div>
    <div class="sw" style="background:#ffe1e1"><span class="h">ffe1e1</span></div>
    <div class="sw" style="background:#f3dbd1"><span class="h">f3dbd1</span></div>
    <div class="sw" style="background:#f5f6fa"><span class="h">f5f6fa</span></div>
    <div class="sw" style="background:#ffeeba"><span class="h">ffeeba</span></div>
    <div class="sw" style="background:#faf6ee"><span class="h">faf6ee</span></div>
    <div class="sw" style="background:#e3fffb"><span class="h">e3fffb</span></div>
    <div class="sw" style="background:#cbe0ff"><span class="h">cbe0ff</span></div>
    <div class="sw" style="background:#ffe9f4"><span class="h">ffe9f4</span></div>
    <div class="sw" style="background:#f26524"><span class="h" style="color:#fff">f26524</span></div>
    <div class="sw" style="background:#00416b"><span class="h" style="color:#fff">00416b</span></div>
    <div class="sw" style="background:#ffcf01"><span class="h">ffcf01</span></div>
  </div>
</body></html>
