<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & lines" subtitle="Flat elevation: gray page, white cards, hairlines" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);display:flex;gap:10px;padding:14px;background:var(--surface-page);box-sizing:border-box}
  .sw{flex:1;border-radius:12px;padding:12px;display:flex;flex-direction:column;justify-content:flex-end;height:94px;color:var(--ink-1)}
  .n{font-weight:600;font-size:13px}.h{font-size:10.5px;color:var(--ink-3)}
  a{color:var(--speedi-red)}a:hover{color:#c9302a}
</style></head><body>
  <div class="sw" style="background:var(--surface-page);box-shadow:var(--border-hairline)"><span class="n">Page</span><span class="h">#F6F6F4 · --surface-page</span></div>
  <div class="sw" style="background:var(--surface-card)"><span class="n">Card</span><span class="h">#FFF · radius 12 · no shadow</span></div>
  <div class="sw" style="background:#fff;box-shadow:var(--border-hairline)"><span class="n">Hairline</span><span class="h">#EBEBE8 inset 1px · --line-1</span></div>
  <div class="sw" style="background:var(--line-2)"><span class="n">Line 2</span><span class="h">#DBDBD8 · strong border</span></div>
</body></html>
